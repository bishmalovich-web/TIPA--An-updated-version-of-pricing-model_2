function lamCard(i){let id='c'+i,lams=Object.keys(D.laminates).sort((a,b)=>a.localeCompare(b,undefined,{numeric:true}));return `<section class=two><div class=card id=${id}><h2><span class=num>${i}</span>📊 Laminate Pricing</h2><div class=grid><label>Margin<input data-k=margin value=.25 type=number step=.01 oninput="calc('${id}')"></label><label>Laminate<select data-k=lam onchange="calc('${id}')">${opt(lams,'823')}</select></label><label>Total Thickness<select data-k=total></select></label><label>Width of Reel (mm)<input data-k=width value=760 type=number oninput="calc('${id}')"></label><label>Amount (Kg)<input data-k=kg value=5000 type=number oninput="calc('${id}')"></label><label>PR / NonPR<select data-k=printed onchange="calc('${id}')"><option>Printed</option><option>Not Printed</option></select></label><label>No of colors<select data-k=colors onchange="calc('${id}')"><option>1-2</option><option>3-4</option><option selected>5-8</option><option>0</option></select></label><label>Shipment<select data-k=ship onchange="calc('${id}')"><option>Europe to US</option><option>Europe to Europe</option><option>Europe to Canada</option></select></label><label>Supplier<select data-k=supplier onchange="calc('${id}')"><option>Bastin</option><option>Marma</option></select></label></div></div><div class=card><h2>📈 Results</h2><div class=resgrid data-out></div></div><div class="card full" style="grid-column:1/-1"><h2>🧱 Laminate Structure</h2><div data-struct></div><h3>All laminate source rows / examples</h3><div id=lamAll></div></div></section>`}
function lamCalc(v){let lam=D.laminates[v.lam],kg=+v.kg,w=+v.width,layers=lam.layers.map((x,i)=>({layer:i+1,mat:x[0],th:x[1],dens:x[2],weight:(w+50)/1000*x[1]/1000*x[2],rm:x[4]}));let sw=layers.reduce((a,x)=>a+x.weight,0),meters=sw?kg/(sw*2):0,rm=sw?layers.reduce((a,x)=>a+x.weight*x.rm,0)/sw:0,ship=v.ship=='Europe to US'?4.35:v.ship=='Europe to Europe'?0.2:2,svc=v.supplier=='Bastin'?0.136437:0.106,total=rm+ship+svc+rm*.06+(v.printed=='Printed'?rm*.028:0),sell=total*(1+ +v.margin);return{layers,meters,rm,total,sell,usd:sell*D.exchangeRate,totalEuro:total*kg,totalUsd:total*kg*D.exchangeRate}}
function filmCard(i){let id='c'+i,films=D.films.map(x=>x[0]);return `<section class=card id=${id}><h2><span class=num>${i}</span>🎬 Film Calculator</h2><div class=grid><label>Film Type<select data-k=film onchange="calc('${id}')">${opt(films,'TIPA 302FG')}</select></label><label>Width (mm)<input data-k=width value=1800 type=number oninput="calc('${id}')"></label><label>Thickness (µ)<input data-k=thick value=20 type=number oninput="calc('${id}')"></label><label>Density<input data-k=density value=1.25 type=number step=.01 oninput="calc('${id}')"></label><label>Input Mode<select data-k=inputMode onchange="calc('${id}')"><option>By Weight</option><option>By Length</option></select></label><label>Weight (Kg)<input data-k=kg value=500 type=number oninput="calc('${id}')"></label><label>Length (m)<input data-k=length placeholder=auto type=number oninput="calc('${id}')"></label><label>Hourly Rate (€)<input data-k=hourly value=510 type=number oninput="calc('${id}')"></label><label>Supplier<select data-k=supplier onchange="calc('${id}')"><option>Marma</option><option>Bastin</option></select></label><label>PR/NonPR<select data-k=printed onchange="calc('${id}')"><option>Not Printed</option><option>Printed</option></select></label><label>No. colors<select data-k=colors onchange="calc('${id}')"><option>0</option><option>1-2</option><option>3-4</option><option>5-8</option></select></label><label>Shipping<select data-k=ship onchange="calc('${id}')"><option>Europe to US</option><option>Europe to Europe</option><option>Europe to Canada</option></select></label><label>Margin<input data-k=margin value=.25 step=.01 type=number oninput="calc('${id}')"></label></div><div class=resgrid data-out style="margin-top:14px"></div><h3>All film source rows</h3><div id=filmAll></div></section>`}
function filmCalc(v){let p=D.films.find(x=>x[0]==v.film)?.[1]||0,kg=+v.kg,w=+v.width,t=+v.thick,d=+v.density,kgm=d*(t/1000)*(w/1000),m=kgm?kg/kgm:0;if(v.inputMode=='By Length'&&+v.length){m=+v.length;kg=m*kgm}let ship=v.ship=='Europe to US'?4.35:v.ship=='Europe to Europe'?0.2:2,total=(p+(+v.hourly/kg)+.2)*1.2+ship+.15,sell=total*(1+ +v.margin);return{m,total,sell,usd:sell*D.exchangeRate,rm:p,ship}}
function mbCard(i){let id='c'+i;return work=='conv'?convCard(id,i):procCard(id,i)}function commonWorkDropdown(id){return `<label>Type of work<select data-k=work onchange="setWorkFromSelect(this.value)"><option value="conv" ${work=='conv'?'selected':''}>Converting</option><option value="lamination" ${work=='lamination'?'selected':''}>Lamination</option><option value="printing" ${work=='printing'?'selected':''}>Printing</option><option value="slitting" ${work=='slitting'?'selected':''}>Slitting</option></select></label>`}function setWorkFromSelect(v){setWork(v)}
function convCard(id,i){let bags=[...new Set(D.convRows.map(x=>x[1]))],widths=[...new Set(D.convRows.map(x=>x[2]))];return `<section class=two><div class=card id=${id}><h2><span class=num>${i}</span>Cost selector</h2><div class=grid><label>Supplier<select data-k=s onchange="calc('${id}')"><option>Marma</option><option>Bastin</option></select></label>${commonWorkDropdown(id)}<label>Bag type<select data-k=bag onchange="calc('${id}')">${opt(bags,'SUP with zipper')}</select></label><label>Width<select data-k=w onchange="calc('${id}')">${opt(widths,'100 MM width')}</select></label><label class=full>Quantity<select data-k=q onchange="calc('${id}')">${opt(D.convQty,'25K pouches')}</select></label></div><div class=green data-out></div></div><div class=card><h2><span class=num>2</span>Matching row preview</h2><div data-preview></div><div class=note>Bastin prices are 30% higher than Marma for lamination</div><div class=note>Bastin prices are 50% higher than Marma for printing</div><div class=note>Converting costs include packing costs - pallets and carton boxes; zipper is not included.</div></div></section>`}
function procCard(id,i){let label=work[0].toUpperCase()+work.slice(1);return `<section class=two><div class=card id=${id}><h2><span class=num>${i}</span>${label} selector</h2><div class=grid><label>Supplier<select data-k=s onchange="calc('${id}')"><option>Marma</option><option>Bastin</option></select></label>${commonWorkDropdown(id)}<label>Width<select data-k=w onchange="calc('${id}')"><option>760</option><option>1220</option></select></label>${work=='printing'?`<label>No. colors<select data-k=color onchange="calc('${id}')"><option>1-2</option><option>3-4</option><option>5-8</option></select></label>`:''}<label class=full>Quantity<select data-k=q onchange="calc('${id}')">${opt(D.procQty,D.procQty[0])}</select></label></div><div class=green data-out></div></div><div class=card><h2><span class=num>2</span>Matching row preview</h2><div data-preview></div><div class=note>Bastin prices are 30% higher than Marma for lamination</div><div class=note>Bastin prices are 50% higher than Marma for printing</div></div></section>`}
function calc(id){let v=vals(id);if(mode=='lam'){let r=lamCalc(v);document.querySelector(`#${id} [data-k=total]`).innerHTML=`<option>${D.laminates[v.lam].total}</option>`;document.querySelector(`#${id} [data-out]`).innerHTML=`<div class=box>Laminate Length<div class=big2>${fmt(r.meters,0)} m</div></div><div class=box>Total Cost (€)<div class=big2>€ ${fmt(r.totalEuro)}</div></div><div class=box>Total Cost ($)<div class=big2>$ ${fmt(r.totalUsd)}</div></div><div class=box>Cost/Kg (€)<div class=big2>€ ${fmt(r.total)}</div></div><div class=box>Cost/Kg ($)<div class=big2>$ ${fmt(r.total*D.exchangeRate)}</div></div><div class=box>Raw Material €/kg<div class=big2>€ ${fmt(r.rm)}</div></div><div class="box sell full">SELL PRICE<div class=big2>€ ${fmt(r.sell)}</div></div><div class="box sell full">SELL PRICE (USD)<div class=big2>$ ${fmt(r.usd)}</div></div>`;document.querySelector(`#${id} [data-struct]`).innerHTML=table(['Layer','Material','Thickness µ','Density','Weight kg/m','RM €/kg'],r.layers.map(x=>[x.layer,x.mat,x.th,x.dens,fmt(x.weight,6),fmt(x.rm,3)]));document.getElementById('lamAll').innerHTML=table(['Laminate','Total Thickness','Structure'],Object.entries(D.laminates).map(([k,x])=>[k,x.total,x.layers.map(l=>l[0]).join(' | ')]))}else if(mode=='film'){let r=filmCalc(v);document.querySelector(`#${id} [data-out]`).innerHTML=`<div class=box>Length<div class=big2>${fmt(r.m,0)} m</div></div><div class=box>Total Cost/Kg<div class=big2>€ ${fmt(r.total)}</div></div><div class="box sell full">SELL PRICE<div class=big2>€ ${fmt(r.sell)}/Kg</div></div><div class=box>USD<div class=big2>$ ${fmt(r.usd)}</div></div><div class=box>RM €/kg<div class=big2>€ ${fmt(r.rm)}</div></div><div class=box>Ship €/kg<div class=big2>€ ${fmt(r.ship)}</div></div>`;document.getElementById('filmAll').innerHTML=table(['Film','Width','Thickness','Density','Weight','Length','Supplier','PR/NonPR','Colors','Shipping','Cost/Kg','Sell','USD'],D.filmRows.map(x=>[x[0],x[1],x[2],x[3],x[4],fmt(x[5],0),x[6],x[7],x[8],x[9],fmt(x[10]),fmt(x[11]),fmt(x[12])]))}else if(work=='conv'){let row=D.convRows.find(x=>x[0]==v.s&&x[1]==v.bag&&x[2]==v.w),idx=D.convQty.indexOf(v.q),val=row?row[3][idx]:0;document.querySelector(`#${id} [data-out]`).innerHTML=`<div>Selected Excel value</div><div class=big>${f6(val)}</div><div>EUR / 1,000 pouches • Quantity: ${v.q}</div><span class=pill>${v.s}</span><span class=pill>${v.bag}</span><span class=pill>${v.w}</span>`;document.querySelector(`#${id} [data-preview]`).innerHTML=table(['Quantity','Value'],D.convQty.map((q,i)=>[q,row?f6(row[3][i]):'']))}else{let type=work=='lamination'?'Lamination':work=='slitting'?'Slitting':'Printing '+v.color,row=D.procRates.find(x=>x[0]==v.s&&x[1]==v.w&&x[2]==type),idx=D.procQty.indexOf(v.q),val=row?row[3][idx]:0;document.querySelector(`#${id} [data-out]`).innerHTML=`<div>Selected Excel value</div><div class=big>${f6(val)}</div><div>EUR / linear meter • Quantity: ${v.q}</div><span class=pill>${v.s}</span><span class=pill>${type}</span><span class=pill>${v.w} width</span>`;document.querySelector(`#${id} [data-preview]`).innerHTML=table(['Quantity','Value'],D.procQty.map((q,i)=>[q,row?f6(row[3][i]):'']))}}
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});render();</script></body></html>
